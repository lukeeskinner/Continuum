# Supabase project configuration for Continuum.
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "continuum"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Edge Functions. JWT verification is disabled for webhook/cron-invoked
# functions which authenticate via their own shared secrets instead.
[functions.agent-sync]
verify_jwt = false

[functions.connection-detect]
verify_jwt = false

[functions.query-synthesize]
verify_jwt = true

[functions.user-invite]
verify_jwt = true

[functions.user-onboard]
verify_jwt = false

[functions.voice-transcribe]
verify_jwt = true

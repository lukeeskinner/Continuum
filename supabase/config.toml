# Supabase project configuration for Continuum.
# Docs: https://supabase.com/docs/guides/cli/config

project_id = "continuum"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

# Desktop signs in by typing a 6-digit code, so the email must render {{ .Token }}
# (the default template only shows the magic link). Captured by Mailpit locally.
[auth.email.template.magic_link]
subject = "Your Continuum sign-in code"
content_path = "./supabase/templates/magic_link.html"

# Edge Functions. JWT verification is disabled for webhook/cron-invoked
# functions which authenticate via their own shared secrets instead.
[functions.agent-sync]
verify_jwt = false

[functions.connection-detect]
verify_jwt = false

[functions.browserbase-enrich]
verify_jwt = false

[functions.query-synthesize]
verify_jwt = true

[functions.user-invite]
verify_jwt = true

[functions.user-onboard]
verify_jwt = false

[functions.voice-transcribe]
verify_jwt = true

[functions.voice-speak]
verify_jwt = true

# Frontend-invoked: returns the cluster graph (nodes + edges) for D3 rendering.
[functions.cluster-graph]
verify_jwt = true

# Frontend-invoked: create a workspace (caller becomes admin, gets a join code).
[functions.cluster-create]
verify_jwt = true

# Frontend-invoked: redeem a join code to join a workspace as a member.
[functions.cluster-join]
verify_jwt = true

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <title>Continuum — Sign in</title>
    <style>
      * {
        margin: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0a0f;
        color: #e5e7eb;
      }
      .card {
        width: 300px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
      }
      p.sub {
        font-size: 12px;
        color: #9ca3af;
        margin-bottom: 4px;
      }
      input {
        width: 100%;
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #3f3f46;
        background: #18181b;
        color: #e5e7eb;
        font-size: 13px;
        outline: none;
      }
      input:focus {
        border-color: #6366f1;
      }
      button {
        padding: 10px 12px;
        border-radius: 8px;
        border: none;
        background: #6366f1;
        color: white;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.5;
      }
      .error {
        font-size: 12px;
        color: #f87171;
        min-height: 16px;
      }
    </style>
  </head>
  <body>
    <form class="card" id="login-form">
      <h1>Continuum</h1>
      <p class="sub">Sign in to start syncing your work.</p>
      <input id="email" type="email" placeholder="Email" required />
      <input id="password" type="password" placeholder="Password" required />
      <p class="error" id="error"></p>
      <button id="submit" type="submit">Sign in</button>
    </form>
    <script src="login.js"></script>
  </body>
</html>

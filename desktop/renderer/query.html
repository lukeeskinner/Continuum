<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' data: blob:"
    />
    <title>Continuum — Ask</title>
    <style>
      :root {
        --bg: rgba(14, 14, 20, 0.9);
        --surface: rgba(255, 255, 255, 0.05);
        --border: rgba(255, 255, 255, 0.1);
        --text: #e5e7eb;
        --muted: #6b7280;
        --accent: #6366f1;
      }
      * { margin: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: transparent;
        color: var(--text);
        overflow: hidden;
      }
      .bar {
        margin: 8px;
        border-radius: 16px;
        background: var(--bg);
        backdrop-filter: blur(28px) saturate(1.4);
        -webkit-backdrop-filter: blur(28px) saturate(1.4);
        border: 1px solid var(--border);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.06);
        overflow: hidden;
      }
      .input-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 18px;
      }
      .glyph { color: var(--muted); font-size: 16px; flex-shrink: 0; }
      #q {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        color: var(--text);
        font-size: 18px;
        font-weight: 400;
      }
      #q::placeholder { color: var(--muted); }
      .icon-btn {
        flex-shrink: 0;
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 9px;
        color: var(--muted);
        font-size: 15px;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s, opacity 0.15s;
      }
      .icon-btn:hover { color: var(--text); background: rgba(255, 255, 255, 0.1); }
      .icon-btn.recording {
        color: #fff;
        background: #ef4444;
        border-color: #ef4444;
        animation: pulse 1.1s ease-in-out infinite;
      }
      .icon-btn[aria-pressed="false"] { opacity: 0.4; }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
        50% { box-shadow: 0 0 0 5px rgba(239, 68, 68, 0); }
      }
      .result {
        max-height: 320px;
        overflow-y: auto;
        border-top: 1px solid var(--border);
        padding: 0 18px;
      }
      .result:empty { display: none; }
      #hint { color: var(--muted); font-size: 12px; padding: 10px 0; }
      #hint:empty { display: none; }
      #answer {
        font-size: 13px;
        line-height: 1.5;
        color: var(--text);
        white-space: pre-wrap;
        padding: 14px 0 10px;
      }
      #answer:empty { display: none; }
      .cite-label {
        font-size: 9px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted);
        margin: 4px 0 6px;
      }
      .cite-label:empty { display: none; }
      #citations { list-style: none; display: flex; flex-direction: column; gap: 5px; padding-bottom: 14px; }
      .cite {
        display: flex;
        gap: 8px;
        align-items: baseline;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 6px 10px;
      }
      .cite__app { font-size: 11px; font-weight: 600; color: #d1d5db; flex-shrink: 0; }
      .cite__topic { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
      .cite__who { font-size: 10px; color: var(--accent); flex-shrink: 0; }
      mark.cite {
        background: rgba(99, 102, 241, 0.22);
        color: #c7d2fe;
        border-radius: 4px;
        padding: 0 3px;
        font-style: normal;
      }
    </style>
  </head>
  <body>
    <div class="bar">
      <div class="input-row">
        <span class="glyph">⌘</span>
        <input id="q" type="text" placeholder="Ask the team mesh…" autocomplete="off" spellcheck="false" />
        <button id="mic" class="icon-btn" title="Push to talk" aria-label="Push to talk">🎙</button>
        <button id="tts" class="icon-btn" title="Read answers aloud" aria-pressed="true" aria-label="Toggle voice">🔊</button>
      </div>
      <div class="result">
        <div id="hint"></div>
        <div id="answer"></div>
        <div class="cite-label" id="cite-label"></div>
        <ul id="citations"></ul>
      </div>
    </div>
    <script src="query.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
    <title>Continuum Agent</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="panel">

      <header class="panel__header">
        <div class="header__left">
          <span class="status-dot" id="status-dot"></span>
          <span class="logo">Continuum</span>
        </div>
        <div class="header__right">
          <button id="toggle" class="btn">Pause</button>
          <button id="signout" class="btn btn--ghost">↪</button>
        </div>
      </header>

      <div class="stats-row">
        <div class="stat">
          <span class="stat__value" id="sync-count">0</span>
          <span class="stat__label">synced</span>
        </div>
        <div class="stat">
          <span class="stat__value" id="session-count">0</span>
          <span class="stat__label">captured</span>
        </div>
        <div class="stat">
          <span class="stat__value" id="block-count">0</span>
          <span class="stat__label">blocked</span>
        </div>
      </div>

      <div class="divider"></div>

      <section class="observations">
        <div class="section-label">RECENT ACTIVITY</div>
        <ul id="obs-list">
          <li class="obs-empty">Watching your screen…</li>
        </ul>
      </section>

      <div class="current" id="current" style="display:none">
        <div class="current__app" id="current-app"></div>
        <div class="current__topic" id="current-topic"></div>
      </div>

    </div>
    <script src="renderer.js"></script>
  </body>
</html>
